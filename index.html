  { city: "Mumbai", country: "India", lat: 19.076, lng: 72.877 },

const DEVICE_TYPES = ["sensor", "gateway", "camera", "controller", "medical", "industrial"];
const ISSUERS = ["ZeroTrust-CA", "EdgeSec-Authority", "CloudPKI-Root", "IoT-TrustAnchor"];
const THREAT_TYPES = ["MITM", "DeviceSpoofing", "DDoS", "UnauthorizedAccess", "DataExfiltration", "BruteForce"];
const SEVERITIES = ["Low", "Medium", "High", "Critical"];
const STATUSES = ["Verified","Verified","Verified","Verified","Verified","Suspicious","Blocked","Isolated"];

// Generate 500 realistic fake edge devices across global cities
function generateFakeDevices() {
  const devs = [];
  for (let i = 0; i < 500; i++) {
    const city = CITIES[i % CITIES.length];
    const type = DEVICE_TYPES[i % DEVICE_TYPES.length];
    const issuer = ISSUERS[i % ISSUERS.length];
    const status = STATUSES[Math.floor(Math.random() * STATUSES.length)];
    const trustScore = status === "Verified" ? Math.floor(Math.random()*20+80)
      : status === "Suspicious" ? Math.floor(Math.random()*30+40)
      : status === "Blocked" ? Math.floor(Math.random()*20+10)
      : Math.floor(Math.random()*15);
    const latJitter = (Math.random()-0.5)*6;
    const lngJitter = (Math.random()-0.5)*6;
    const padNum = String(i+1).padStart(5,"0");
    const tag = city.city.substring(0,3).toUpperCase();
    devs.push({
      id: `DEV-${tag}-${padNum}`,
      deviceId: `DEV-${tag}-${padNum}`,
      name: `${type.toUpperCase()}-NODE-${padNum}`,
      type, status, trustScore,
      anomalyScore: (Math.random()*0.6).toFixed(2),
      aiConfidence: `${(85+Math.random()*14).toFixed(1)}%`,
      location: { city: city.city, country: city.country, lat: city.lat+latJitter, lng: city.lng+lngJitter },
      certificate: { issuer, valid: status !== "Blocked", expiry: new Date(Date.now()+Math.random()*365*86400000).toISOString().split("T")[0] },
      lastSeen: new Date(Date.now()-Math.random()*600000).toISOString(),
      registeredAt: new Date(Date.now()-Math.random()*30*86400000).toISOString()
    });
  }
  return devs;
}

// ─── DATA ENGINE ─────────────────────────────────────────────────────────────
const BACKEND_URL = "http://localhost:5000";
const socket = io(BACKEND_URL, { autoConnect: false });

function generateThreat(devices) {
  if (!devices || devices.length === 0) return null;
  const type = THREAT_TYPES[Math.floor(Math.random() * THREAT_TYPES.length)];
  const sev = Math.random() < 0.1 ? "Critical" : Math.random() < 0.25 ? "High" : Math.random() < 0.5 ? "Medium" : "Low";
  const src = devices[Math.floor(Math.random() * devices.length)];
  const msgs = {
    MITM: "Man-in-the-Middle attack intercepting TLS 1.3 handshake at gateway",
    DeviceSpoofing: "X.509 certificate replay attack — unauthorized device impersonation",
    DDoS: `Volumetric DDoS: ${(Math.random() * 3 + 1).toFixed(1)}M packets/sec at cloud ingress`,
    UnauthorizedAccess: `Brute-force: ${Math.floor(Math.random() * 5000 + 1000)} failed auth attempts`,
    DataExfiltration: "Anomalous outbound transfer detected via encrypted covert channel",
    BruteForce: "Credential stuffing attack on device management portal"
  };
  return {
    id: `THR-${Date.now().toString(36).toUpperCase()}`,
    type, severity: sev,
    sourceDevice: src?.id || src?.deviceId || "UNKNOWN",
    description: msgs[type],
    timestamp: new Date().toISOString(),
    status: "Mitigated",
    response: sev === "Critical" ? "ISOLATED + KEY_ROTATED + MFA_TRIGGERED" :
      sev === "High" ? "ACCESS_RESTRICTED + TRUST_REDUCED" :
        sev === "Medium" ? "MONITORING_ENHANCED" : "LOGGED",
    cvss: (Math.random() * 4 + 5).toFixed(1)
  };
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
export default function App() {
  const [authed, setAuthed] = useState(false);
  const [user, setUser] = useState(null);
  const [page, setPage] = useState("dashboard");
  const [devices, setDevices] = useState([]);
  const [threats, setThreats] = useState([]);
  const [packets, setPackets] = useState([]);
  const [alerts, setAlerts] = useState([]);
  const [criticalCount, setCriticalCount] = useState(0);
  const [aiOpen, setAiOpen] = useState(false);

  // Fetch initial devices
  const fetchDevices = async () => {
    try {
      const res = await fetch(`${BACKEND_URL}/api/devices`, { signal: AbortSignal.timeout(2000) });
      if (res.ok) {
        let initialDevices = await res.json();
        initialDevices = initialDevices.map(d => ({ ...d, id: d.deviceId || d.id }));
        setDevices(initialDevices);
        return;
      }
    } catch (e) {
      console.log("Backend offline - loading 500 simulated edge nodes.");
    }
    setDevices(generateFakeDevices());
  };

  useEffect(() => {
    if (!authed) return;
    socket.connect();
    
    fetchDevices();

    socket.on('threat_event', (t) => {
      setThreats(prev => [t, ...prev].slice(0, 200));
      if (t.severity === "Critical" || t.severity === "High") {
        setCriticalCount(c => c + 1);
        setAlerts(prev => [{ ...t, id: t.id || `THR-${Date.now()}` }, ...prev].slice(0, 4));
        setDevices(prev => prev.map(d =>
          d.id === t.deviceId || d.deviceId === t.deviceId
            ? { ...d, status: t.severity === "Critical" ? "Isolated" : "Suspicious", trustScore: Math.max(0, d.trustScore - 20) }
            : d
        ));
      }
    });

    socket.on('pipeline_packet', (p) => {
      setPackets(prev => [{ ...p, id: `PKT-${Date.now()}` }, ...prev].slice(0, 100));
    });

        // ─── LIVE THREAT BURST ENGINE: 1-3 threats every 3 seconds ───────────
    const interval = setInterval(() => {
      setDevices(currentDevices => {
        if (currentDevices.length === 0) return currentDevices;
        const burstCount = Math.random() < 0.25 ? 3 : Math.random() < 0.5 ? 2 : 1;
        const newThreats = [];
        let updated = [...currentDevices];
        for (let b = 0; b < burstCount; b++) {
          const t = generateThreat(currentDevices);
          if (!t) continue;
          newThreats.push(t);
          const penalty = t.severity === "Critical" ? 35 : t.severity === "High" ? 25 : t.severity === "Medium" ? 12 : 5;
          updated = updated.map(d => {
            if (d.id === t.sourceDevice || d.deviceId === t.sourceDevice) {
              const ns = Math.max(0, (d.trustScore || 100) - penalty);
              const nst = t.severity === "Critical" ? "Isolated" : t.severity === "High" ? (ns < 40 ? "Blocked" : "Suspicious") : d.status === "Verified" ? "Suspicious" : d.status;
              return { ...d, status: nst, trustScore: ns, anomalyScore: (Math.random()*0.5+0.4).toFixed(2), aiConfidence: `${(90+Math.random()*9).toFixed(1)}%`, lastSeen: new Date().toISOString() };
            }
            return d;
          });
        }
        if (newThreats.length > 0) {
          setThreats(prev => [...newThreats, ...prev].slice(0, 500));
          // Notification for ALL severities every 3s
          setAlerts(prev => [...newThreats.map(t => ({ ...t, id: t.id || `THR-${Date.now()}-${Math.random()}` })), ...prev].slice(0, 5));
          const crit = newThreats.filter(t => t.severity === "Critical" || t.severity === "High").length;
          if (crit > 0) setCriticalCount(c => c + crit);
        }
        return updated;
      });
    }, 3000);

    return () => {
      clearInterval(interval);
      socket.off('threat_event');
      socket.off('pipeline_packet');
      socket.disconnect();
    };
  }, [authed]);

  // Remove stale alerts
  useEffect(() => {
    if (alerts.length > 0) {
      const timer = setTimeout(() => setAlerts(prev => prev.slice(0, -1)), 4000);
      return () => clearTimeout(timer);
    }
  }, [alerts]);

  const stats = useMemo(() => {
    if (devices.length === 0) return { total: 0, verified: 0, suspicious: 0, blocked: 0, isolated: 0, avgTrust: 0 };
    return {
      total: devices.length,
      verified: devices.filter(d => d.status === "Verified").length,
      suspicious: devices.filter(d => d.status === "Suspicious").length,
      blocked: devices.filter(d => d.status === "Blocked").length,
      isolated: devices.filter(d => d.status === "Isolated").length,
      avgTrust: Math.round(devices.reduce((a, d) => a + (d.trustScore || 0), 0) / devices.length),
    };
  }, [devices]);

  const handleRegisterDevice = async (device) => {
    try {
      const res = await fetch(`${BACKEND_URL}/api/devices/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(device)
      });
      if (res.ok) {
        const newDev = await res.json();
        const mappedDev = { ...newDev, id: newDev.deviceId || newDev.id };
        setDevices(prev => [mappedDev, ...prev]);
        setAlerts(prev => [{ id: `INFO-${Date.now()}`, type: "DeviceRegistered", severity: "Low", description: `New device ${mappedDev.id} registered.`, timestamp: new Date().toISOString(), response: "CERTIFICATE_ISSUED + LEDGER_UPDATED" }, ...prev].slice(0, 4));
      }
    } catch (e) {
      console.error("Failed to register device", e);
    }
  };

  const handleTriggerAttack = (type) => {
    // Manually triggering an attack on the frontend for UI demo purposes, since the backend handles random ones.
    const forced = { id: `THR-TEST-${Date.now()}`, type, severity: type === "DDoS" ? "Critical" : "High", description: `Manual Simulation: ${type}`, timestamp: new Date().toISOString() };
    setThreats(prev => [forced, ...prev]);
    setCriticalCount(c => c + 1);
    setAlerts(prev => [forced, ...prev].slice(0, 4));
  };

  const handleRevokeDevice = async (deviceId) => {
    try {
      const res = await fetch(`${BACKEND_URL}/api/devices/revoke/${deviceId}`, {
        method: 'POST'
      });
      if (res.ok) {
        setDevices(prev => prev.map(d => d.id === deviceId || d.deviceId === deviceId ? { ...d, status: "Blocked", trustScore: 0, certificate: { ...(d.certificate || {}), valid: false } } : d));
      }
    } catch (e) {
      console.error("Failed to revoke device", e);
    }
  };

  if (!authed) return (
    <>
      <style>{css}</style>
      <AuthScreen onLogin={(u) => { setUser(u); setAuthed(true); }} />
    </>
  );

  const NAV = [
    { id: "dashboard", icon: "⬡", label: "DASH" },
    { id: "map", icon: "⊕", label: "MAP" },
    { id: "threats", icon: "◈", label: "SOC" },
    { id: "devices", icon: "◎", label: "DEV" },
    { id: "pipeline", icon: "⊞", label: "PIPE" },
    { id: "zerotrust", icon: "⬢", label: "ZT" },
    { id: "analytics", icon: "◉", label: "AI" },
    { id: "blockchain", icon: "⬡", label: "CHAIN" },
    { id: "business", icon: "◆", label: "BIZ" },
  ];

  return (
    <>
      <style>{css}</style>
      <div className="app">
        {/* Sidebar */}
        <div className="sidebar">
          <div className="logo-mark">ZT</div>
          {NAV.map((n, i) => (
            <button key={n.id} className={`nav-btn ${page === n.id ? "active" : ""}`} onClick={() => setPage(n.id)} title={n.id}>
              {n.id === "threats" && criticalCount > 0 && <span className="notif-dot" />}
              <span style={{ fontSize: 18 }}>{n.icon}</span>
              <span>{n.label}</span>
            </button>
          ))}
          <div className="nav-sep" />
          <button className={`nav-btn ${aiOpen ? "active" : ""}`} onClick={()=>setAiOpen(o=>!o)} title="AI Command" style={{ position:"relative" }}>
            <span style={{ fontSize:18 }}>🤖</span>
            <span style={{ fontSize:"7px", fontFamily:"Orbitron,monospace", letterSpacing:0.5 }}>AI CMD</span>
            <span style={{ position:"absolute",top:4,right:4,width:7,height:7,borderRadius:"50%",background:"var(--cyan)",boxShadow:"0 0 6px var(--cyan)",animation:"pulse 2s infinite" }} />
          </button>
        </div>

        {/* Main */}
        <div className="main">
          <TopBar page={page} user={user} stats={stats} criticalCount={criticalCount} onPageChange={setPage} />
          <div className="content" style={{ gridTemplateColumns: "1fr" }}>
            {page === "dashboard" && <DashboardPage devices={devices} threats={threats} stats={stats} packets={packets} />}
            {page === "map" && <MapPage devices={devices} threats={threats} />}
            {page === "threats" && <ThreatPage threats={threats} onTrigger={handleTriggerAttack} />}
            {page === "devices" && <DevicesPage devices={devices} onRegister={handleRegisterDevice} onRevoke={handleRevokeDevice} />}
            {page === "pipeline" && <PipelinePage packets={packets} />}
            {page === "zerotrust" && <ZeroTrustPage devices={devices} />}
            {page === "analytics" && <AnalyticsPage devices={devices} threats={threats} stats={stats} />}
            {page === "blockchain" && <BlockchainPage devices={devices} />}
            {page === "business" && <BusinessPage />}
          </div>
        </div>
      </div>
      {aiOpen && <AISidebar devices={devices} setDevices={setDevices} threats={threats} stats={stats} onClose={()=>setAiOpen(false)} />}

      {/* Alert banners */}
      <div className="alert-banner">
        {alerts.map((a, i) => (
          <div key={a.id + i} className={`alert-item ${a.severity}`}>
            <div className={`alert-title ${a.severity}`}>⚠ {a.type} — {a.severity}</div>
            <div className="alert-body">{a.description?.slice(0, 80)}</div>
            <div style={{ fontSize: 9, color: "var(--dim)", marginTop: 4, fontFamily: "Share Tech Mono" }}>AUTO-RESPONSE: {a.response}</div>
          </div>
        ))}
      </div>
    </>
  );
}

// // ─── AUTH SCREEN — MULTI-FACTOR AUTHENTICATION ────────────────────────────────
function AuthScreen({ onLogin }) {
  const [step, setStep] = useState("credentials"); // credentials | mfa
  const [username, setUsername] = useState("demo");
  const [password, setPassword] = useState("demo");
  const [role, setRole] = useState("Admin");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState("");
  const [pendingUser, setPendingUser] = useState(null);

  // MFA state
  const [totpCode, setTotpCode] = useState("");
  const [mfaInput, setMfaInput] = useState(["","","","","",""]);
  const [countdown, setCountdown] = useState(30);
  const [mfaLoading, setMfaLoading] = useState(false);
  const [mfaError, setMfaError] = useState("");
  const [biometricDone, setBiometricDone] = useState(false);
  const inputRefs = [useRef(),useRef(),useRef(),useRef(),useRef(),useRef()];

  const CREDENTIALS = { demo: "demo", admin: "Admin@ZeroTrust2024", analyst: "Analyst@ZT2024", manager: "Manager@ZT2024" };

  // Generate a fresh 6-digit TOTP
  const genTOTP = () => String(Math.floor(100000 + Math.random() * 900000));

  // Start countdown + TOTP refresh
  useEffect(() => {
    if (step !== "mfa") return;
    const newCode = genTOTP();
    setTotpCode(newCode);
    setCountdown(30);
    const tick = setInterval(() => {
      setCountdown(prev => {
        if (prev <= 1) {
          setTotpCode(genTOTP());
          return 30;
        }
        return prev - 1;
      });
    }, 1000);
    // Simulate biometric scan completing after 1.5s
    const bioTimer = setTimeout(() => setBiometricDone(true), 1500);
    return () => { clearInterval(tick); clearTimeout(bioTimer); };
  }, [step]);

  // Step 1: credential check
  const handleLogin = () => {
    setLoading(true); setError("");
    setTimeout(() => {
      if (CREDENTIALS[username] === password) {
        setPendingUser({ username, role, name: username.charAt(0).toUpperCase() + username.slice(1) });
        setBiometricDone(false);
        setMfaInput(["","","","","",""]);
        setMfaError("");
        setStep("mfa");
        setLoading(false);
      } else {
        setError("Invalid credentials. Try: demo / demo");
        setLoading(false);
      }
    }, 1500);
  };

  // OTP digit input handler
  const handleDigit = (i, val) => {
    if (!/^\d?$/.test(val)) return;
    const next = [...mfaInput];
    next[i] = val;
    setMfaInput(next);
    if (val && i < 5) inputRefs[i+1].current?.focus();
    if (!val && i > 0) inputRefs[i-1].current?.focus();
  };

  const handleKeyDown = (i, e) => {
    if (e.key === "Backspace" && !mfaInput[i] && i > 0) {
      inputRefs[i-1].current?.focus();
    }
    if (e.key === "Enter") handleVerifyMFA();
  };

  // Step 2: MFA verify
  const handleVerifyMFA = () => {
    const entered = mfaInput.join("");
    if (entered.length < 6) { setMfaError("Enter all 6 digits"); return; }
    setMfaLoading(true); setMfaError("");
    setTimeout(() => {
      if (entered === totpCode) {
        onLogin(pendingUser);
      } else {
        setMfaError("Invalid code. Use the code shown in the Authenticator panel.");
        setMfaLoading(false);
        setMfaInput(["","","","","",""]);
        inputRefs[0].current?.focus();
      }
    }, 1200);
  };

  // Auto-fill when all digits entered
  useEffect(() => {
    if (mfaInput.every(d => d !== "") && step === "mfa") handleVerifyMFA();
  }, [mfaInput]);

  const circumference = 2 * Math.PI * 20;
  const progress = circumference - (countdown / 30) * circumference;

  if (step === "mfa") return (
    <div className="auth-screen" style={{ background: "radial-gradient(ellipse at 50% 0%, #0D1235 0%, #070B1A 70%)" }}>
      <div style={{ display: "flex", gap: 24, alignItems: "flex-start", maxWidth: 760, width: "100%", padding: "0 20px" }}>

        {/* Left: Demo Authenticator App */}
        <div style={{ width: 280, background: "linear-gradient(135deg,rgba(0,212,255,0.06),rgba(7,11,26,0.95))", border: "1px solid rgba(0,212,255,0.2)", borderRadius: 16, padding: 24, flexShrink: 0 }}>
          <div style={{ fontFamily: "Orbitron,monospace", fontSize: 10, color: "var(--cyan)", letterSpacing: 2, marginBottom: 16 }}>◈ ZT AUTHENTICATOR</div>

          {/* Biometric scanner */}
          <div style={{ textAlign: "center", marginBottom: 20 }}>
            <div style={{ position: "relative", display: "inline-block" }}>
              <div style={{ width: 80, height: 80, borderRadius: "50%", border: `2px solid ${biometricDone ? "var(--green)" : "rgba(0,212,255,0.4)"}`, display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto", transition: "border-color 0.5s", boxShadow: biometricDone ? "0 0 20px rgba(0,255,136,0.3)" : "0 0 20px rgba(0,212,255,0.1)" }}>
                <span style={{ fontSize: 36 }}>{biometricDone ? "✅" : "👆"}</span>
              </div>
              {!biometricDone && <div style={{ position: "absolute", top: 0, left: 0, right: 0, bottom: 0, borderRadius: "50%", border: "2px solid var(--cyan)", animation: "pulse 1s infinite" }} />}
            </div>
            <div style={{ fontSize: 10, color: biometricDone ? "var(--green)" : "var(--cyan)", fontFamily: "Share Tech Mono,monospace", marginTop: 8 }}>
              {biometricDone ? "✓ BIOMETRIC VERIFIED" : "SCANNING FINGERPRINT..."}
            </div>
          </div>

        <button className="btn btn-gold" style={{ width:"100%", justifyContent:"center", padding:12 }} onClick={handleLogin} disabled={loading}>
          {loading?"AUTHENTICATING...":"AUTHENTICATE → MFA"}

// ─── TOPBAR ───────────────────────────────────────────────────────────────────
function TopBar({ page, user, stats, criticalCount, onPageChange }) {
  const PAGE_TITLES = {
    dashboard: "Security Operations Center", map: "Edge Device Intelligence Map",
    threats: "Threat Command Center", devices: "Device Registry Console",
    pipeline: "Secure Data Pipeline Monitor", zerotrust: "Zero Trust Policy Dashboard",
    analytics: "AI Security Analytics", blockchain: "Blockchain Device Ledger",
    business: "Business Intelligence"
  };
  const [time, setTime] = useState(new Date());
  useEffect(() => {
    const t = setInterval(() => setTime(new Date()), 1000);
    return () => clearInterval(t);
  }, []);

  return (
    <div className="topbar">
      <div>
        <div className="topbar-title">{PAGE_TITLES[page]}</div>
        <div className="topbar-sub">{time.toISOString().slice(0, 19).replace("T", " ")} UTC | {user?.role?.toUpperCase()} SESSION</div>
      </div>
      <div className="spacer" />
      <div className="status-pill"><div className="pulse" />{stats.verified} VERIFIED</div>
      {criticalCount > 0 && (
        <div className={`threat-pill ${criticalCount > 5 ? "critical" : "high"}`} onClick={() => onPageChange("threats")}>

      <div style={{ fontSize: 11, color: "var(--dim)", fontFamily: "Share Tech Mono", padding: "4px 10px", background: "rgba(201,168,76,0.06)", borderRadius: 6, border: "1px solid rgba(201,168,76,0.15)" }}>
        {user?.name?.toUpperCase()} · {user?.role}
      </div>
    </div>
  );
}

// ─── MAP PAGE ─────────────────────────────────────────────────────────────────
function MapPage({ devices, threats }) {
  const [tooltip, setTooltip] = useState(null);
  const [filter, setFilter] = useState("All");

  // Project lat/lng to SVG coordinates (simple equirectangular)
  const project = (lat, lng) => {
    const x = (lng + 180) * (800 / 360);
    const y = (90 - lat) * (400 / 180);
    return { x, y };
  };

  const statusColor = { Verified: GREEN, Suspicious: ORANGE, Blocked: RED, Isolated: CYAN };
  const filtered = filter === "All" ? devices : devices.filter(d => d.status === filter);

  // Stats by region
  const regionStats = useMemo(() => {
    const r = {};
    devices.forEach(d => {
      const c = d.location.country;
      if (!r[c]) r[c] = { total: 0, suspicious: 0, blocked: 0 };
      r[c].total++;
      if (d.status === "Suspicious") r[c].suspicious++;
      if (d.status === "Blocked" || d.status === "Isolated") r[c].blocked++;
    });
    return r;
  }, [devices]);

  return (
    <div style={{ display: "grid", gap: 14 }}>
      <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
        {["All", "Verified", "Suspicious", "Blocked", "Isolated"].map(s => (
          <button key={s} onClick={() => setFilter(s)} className="btn btn-sm" style={{
            background: filter === s ? "rgba(201,168,76,0.2)" : "transparent",
            border: `1px solid ${filter === s ? "rgba(201,168,76,0.5)" : "rgba(255,255,255,0.1)"}`,
            color: filter === s ? GOLD : "#7A8BA8"
          }}>{s} {s !== "All" ? `(${devices.filter(d => d.status === s).length})` : `(${devices.length})`}</button>
        ))}
        <div style={{ flex: 1 }} />
        <div className="enc-badge">🌍 GLOBAL COVERAGE — {devices.length} NODES</div>
      </div>

      <div className="card">
        <div className="card-title"><span className="dot" />Real-Time Edge Device Intelligence Map — {filtered.length} Devices Visible</div>
        <div className="map-container" style={{ position: "relative" }}>
          <svg viewBox="0 0 800 400" className="map-svg" style={{ display: "block" }}>
            {/* World background */}
            <rect width="800" height="400" fill="#070B1A" />
            {/* Grid lines */}
            {Array.from({ length: 9 }, (_, i) => (
              <line key={`h${i}`} x1="0" y1={i * 50} x2="800" y2={i * 50} stroke="rgba(255,255,255,0.04)" strokeWidth="0.5" />
            ))}
            {Array.from({ length: 17 }, (_, i) => (
              <line key={`v${i}`} x1={i * 50} y1="0" x2={i * 50} y2="400" stroke="rgba(255,255,255,0.04)" strokeWidth="0.5" />
            ))}

            {/* Simplified continent shapes */}
            <path d="M 160,80 L 200,70 L 240,90 L 260,120 L 240,160 L 200,170 L 170,140 L 150,110 Z" fill="rgba(30,39,97,0.5)" stroke="rgba(201,168,76,0.15)" strokeWidth="0.5" />
            <path d="M 340,60 L 420,50 L 500,70 L 520,110 L 500,150 L 440,160 L 380,130 L 330,100 Z" fill="rgba(30,39,97,0.5)" stroke="rgba(201,168,76,0.15)" strokeWidth="0.5" />
            <path d="M 380,170 L 440,165 L 460,200 L 440,240 L 400,250 L 375,220 Z" fill="rgba(30,39,97,0.4)" stroke="rgba(201,168,76,0.1)" strokeWidth="0.5" />
            <path d="M 540,80 L 620,75 L 680,100 L 700,140 L 660,170 L 600,160 L 550,130 L 530,100 Z" fill="rgba(30,39,97,0.5)" stroke="rgba(201,168,76,0.15)" strokeWidth="0.5" />
            <path d="M 620,200 L 680,195 L 720,220 L 710,270 L 660,280 L 610,250 Z" fill="rgba(30,39,97,0.4)" stroke="rgba(201,168,76,0.1)" strokeWidth="0.5" />

            {/* Heatmap circles for high-risk areas */}
            {devices.filter(d => d.status !== "Verified").slice(0, 20).map((d, i) => {
              const { x, y } = project(d.location.lat, d.location.lng);
              return (
                <circle key={`heat${i}`} cx={x} cy={y} r={20} fill={d.status === "Blocked" ? "rgba(255,59,59,0.06)" : "rgba(255,140,0,0.06)"} />
              );
            })}

            {/* Device dots */}
            {filtered.map(d => {
              const { x, y } = project(d.location.lat, d.location.lng);
              const col = statusColor[d.status] || GREEN;
              return (
                <g key={d.id}
                  onMouseEnter={(e) => setTooltip({ device: d, x: e.clientX, y: e.clientY })}
                  onMouseLeave={() => setTooltip(null)}
                  style={{ cursor: "pointer" }}>
                  {d.status !== "Verified" && (
                    <circle cx={x} cy={y} r={8} fill="none" stroke={col} strokeWidth="1" opacity="0.4" className="device-dot">
                      <animate attributeName="r" values="4;10;4" dur="2s" repeatCount="indefinite" />
                      <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite" />
                    </circle>
                  )}
                  <circle cx={x} cy={y} r={d.status === "Verified" ? 2.5 : 3.5}
                    fill={col} opacity={0.9}
                    style={{ filter: d.status !== "Verified" ? `drop-shadow(0 0 3px ${col})` : "none" }} />
                </g>
              );
            })}
          </svg>

          {/* Legend */}
          <div style={{ position: "absolute", bottom: 12, left: 12, display: "flex", gap: 10 }}>
            {Object.entries(statusColor).map(([s, c]) => (
              <div key={s} style={{ display: "flex", alignItems: "center", gap: 4, fontSize: 9, fontFamily: "Orbitron, monospace", color: c }}>
                <div style={{ width: 7, height: 7, borderRadius: "50%", background: c }} />
                {s}
              </div>
            ))}
          </div>

          {/* Tooltip */}
          {tooltip && (
            <div className="map-tooltip" style={{ left: tooltip.x + 10, top: tooltip.y - 80, position: "fixed" }}>
              <div className="map-tooltip-title">{tooltip.device.id}</div>
              <div style={{ fontSize: 10, color: "var(--dim)" }}>{tooltip.device.name}</div>
              <div style={{ fontSize: 10, color: "var(--dim)", marginTop: 4 }}>📍 {tooltip.device.location.city}, {tooltip.device.location.country}</div>
              <div style={{ marginTop: 6 }}>
                <span className={`badge badge-${tooltip.device.status.toLowerCase()}`}>{tooltip.device.status}</span>
                <span style={{ fontFamily: "Orbitron, monospace", fontSize: 10, marginLeft: 8, color: tooltip.device.trustScore > 70 ? GREEN : tooltip.device.trustScore > 40 ? ORANGE : RED }}>
                  Trust: {tooltip.device.trustScore}
                </span>
              </div>

        {/* Risk heatmap legend */}

          <span style={{ fontSize: 9, color: "var(--dim)", fontFamily: "Share Tech Mono" }}>RISK HEATMAP:</span>

// ─── DEVICES PAGE ──────────────────────────────────────────────────────────────
function DevicesPage({ devices, onRegister, onRevoke }) {
  const [search, setSearch] = useState("");
  const [statusFilter, setStatusFilter] = useState("All");
  const [sortBy, setSortBy] = useState("trustScore");
  const [showReg, setShowReg] = useState(false);
  const [newDevice, setNewDevice] = useState({ name: "", type: "sensor", city: "Mumbai", lat: 19.076, lng: 72.877 });
  const [page, setPage] = useState(1);
  const PER_PAGE = 20;

  const filtered = useMemo(() => {
    let d = [...devices];
    if (search) d = d.filter(dev => dev.id.toLowerCase().includes(search.toLowerCase()) || dev.name?.toLowerCase().includes(search.toLowerCase()) || dev.location?.city?.toLowerCase().includes(search.toLowerCase()));
    if (statusFilter !== "All") d = d.filter(dev => dev.status === statusFilter);
    d.sort((a, b) => sortBy === "trustScore" ? a.trustScore - b.trustScore : a.id.localeCompare(b.id));
    return d;
  }, [devices, search, statusFilter, sortBy]);

  const paginated = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);
  const totalPages = Math.ceil(filtered.length / PER_PAGE);

  const trustColor = (s) => s > 70 ? GREEN : s > 40 ? ORANGE : RED;

  return (
    <div style={{ display: "grid", gap: 14 }}>
      {/* Controls */}
      <div className="card" style={{ padding: "12px 16px" }}>
        <div style={{ display: "flex", gap: 10, alignItems: "center", flexWrap: "wrap" }}>
          <input className="input" style={{ width: 220 }} placeholder="Search ID, name, city..." value={search} onChange={e => { setSearch(e.target.value); setPage(1); }} />
          <select className="input select" style={{ width: 130 }} value={statusFilter} onChange={e => setStatusFilter(e.target.value)}>
            {["All", "Verified", "Suspicious", "Blocked", "Isolated"].map(s => <option key={s}>{s}</option>)}
          </select>
          <select className="input select" style={{ width: 150 }} value={sortBy} onChange={e => setSortBy(e.target.value)}>
            <option value="trustScore">Sort: Trust Score</option>
            <option value="id">Sort: Device ID</option>
          </select>
          <div style={{ flex: 1 }} />
          <span style={{ fontSize: 11, color: "var(--dim)" }}>{filtered.length} devices</span>
          <button className="btn btn-gold" onClick={() => setShowReg(true)}>+ REGISTER DEVICE</button>
        </div>
      </div>

      {/* Register modal */}
      {showReg && (
        <div className="card" style={{ borderColor: "rgba(0,212,255,0.3)", background: "linear-gradient(135deg, rgba(0,212,255,0.04), rgba(13,18,53,0.95))" }}>
          <div className="card-title"><span className="dot" style={{ background: "var(--cyan)" }} />Register New Edge Device</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 12 }}>
            <div><label className="form-label">Device Name</label><input className="input" value={newDevice.name} onChange={e => setNewDevice(p => ({ ...p, name: e.target.value }))} placeholder="SENSOR-Mumbai-501" /></div>
            <div><label className="form-label">Type</label><select className="input select" value={newDevice.type} onChange={e => setNewDevice(p => ({ ...p, type: e.target.value }))}>{DEVICE_TYPES.map(t => <option key={t}>{t}</option>)}</select></div>
            <div><label className="form-label">City</label><select className="input select" value={newDevice.city} onChange={e => { const c = CITIES.find(ci => ci.city === e.target.value); setNewDevice(p => ({ ...p, city: e.target.value, lat: c?.lat, lng: c?.lng })); }}>{CITIES.map(c => <option key={c.city}>{c.city}</option>)}</select></div>
          </div>
          <div style={{ display: "flex", gap: 10 }}>
            <button className="btn btn-gold" onClick={() => { onRegister(newDevice); setShowReg(false); setNewDevice({ name: "", type: "sensor", city: "Mumbai", lat: 19.076, lng: 72.877 }); }}>REGISTER & ISSUE CERTIFICATE</button>
            <button className="btn btn-outline" onClick={() => setShowReg(false)}>CANCEL</button>
          </div>
        </div>
      )}

      {/* Table */}
      <div className="card" style={{ padding: 0 }}>
        <div className="table-wrap">
          <table className="data-table">
            <thead><tr><th>Device ID</th><th>Name</th><th>Type</th><th>Location</th><th>Status</th><th>Trust Score</th><th>Certificate</th><th>Last Seen</th><th>Actions</th></tr></thead>
            <tbody>
              {paginated.map(d => (
                <tr key={d.id}>
                  <td className="mono">{d.id}</td>
                  <td style={{ fontSize: 11 }}>{d.name}</td>
                  <td><span style={{ fontSize: 9, fontFamily: "Orbitron, monospace", color: "var(--dim)", background: "rgba(255,255,255,0.05)", padding: "2px 6px", borderRadius: 3 }}>{d.type}</span></td>
                  <td style={{ fontSize: 10, color: "var(--dim)" }}>📍 {d.location.city}</td>
                  <td><span className={`badge badge-${d.status.toLowerCase()}`}>{d.status}</span></td>
                  <td>
                    <div className="trust-bar-wrap">
                      <div className="trust-bar"><div className="trust-bar-fill" style={{ width: `${d.trustScore}%`, background: trustColor(d.trustScore) }} /></div>
                      <div className="trust-val" style={{ color: trustColor(d.trustScore) }}>{d.trustScore}</div>
                    </div>
                  </td>
                  <td>
                    <span style={{ fontSize: 9, fontFamily: "Share Tech Mono", color: d.certificate?.valid ? GREEN : RED }}>
                      {d.certificate?.valid ? "✓ VALID" : "✗ EXPIRED"} · {d.certificate?.issuer?.slice(0, 10)}
                    </span>
                  </td>
                  <td style={{ fontSize: 9, color: "var(--dim)", fontFamily: "Share Tech Mono" }}>{new Date(d.lastSeen).toLocaleTimeString()}</td>
                  <td>
                    <div style={{ display: "flex", gap: 4 }}>
                      <button className="btn btn-sm btn-outline" title="View Details">⊞</button>
                      {d.status !== "Blocked" && <button className="btn btn-sm btn-red" onClick={() => onRevoke(d.id)} title="Revoke">✗</button>}
                    </div>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 16px", borderTop: "1px solid rgba(255,255,255,0.05)" }}>
          <span style={{ fontSize: 11, color: "var(--dim)" }}>Page {page} of {totalPages}</span>
          <div style={{ display: "flex", gap: 6 }}>
            <button className="btn btn-sm btn-outline" onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1}>← PREV</button>
            <button className="btn btn-sm btn-outline" onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages}>NEXT →</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── PIPELINE PAGE ────────────────────────────────────────────────────────────
function PipelinePage({ packets: socketPackets }) {
  const termRef = useRef(null);
  const [localPackets, setLocalPackets] = useState([]);
  const [paused, setPaused] = useState(false);
  const [filter, setFilter] = useState("ALL");
  const [bpsData, setBpsData] = useState(() =>
    Array.from({ length: 30 }, (_, i) => ({ t: i, bps: Math.floor(Math.random()*800+200) }))
  );
  const counterRef = useRef(0);

  const PKT_TYPES  = ["TELEMETRY","AUTH","CONTROL","HEARTBEAT","DATA","ALERT","SYNC","HANDSHAKE"];
  const STAGES     = ["EDGE","GATEWAY","CLOUD"];
  const ENCS       = ["AES-256-GCM","TLS-1.3","mTLS","AES-256-CBC","ChaCha20-Poly1305"];
  const PROTOCOLS  = ["MQTT/TLS","HTTPS","gRPC-TLS","CoAP/DTLS","AMQP/TLS","WebSocket-TLS"];
  const CITIES_SHORT = ["MUM","DEL","NYC","TKY","SGP","DXB","SYD","BER","TOR","LON","PAR","BNG","HYD","CHN","SAO"];
  const STATUSES   = ["ENCRYPTED","VERIFIED","FORWARDED","PROCESSED","CACHED","QUEUED"];
  const typeColor  = { TELEMETRY:"#00D4FF",AUTH:"#C9A84C",CONTROL:"#FF8C00",HEARTBEAT:"#00FF88",DATA:"#9B59B6",ALERT:"#FF3B3B",SYNC:"#1abc9c",HANDSHAKE:"#e74c3c" };
  const stageColor = { EDGE:"#00aaff",GATEWAY:"#C9A84C",CLOUD:"#00FF88" };

  function genPacket() {
    counterRef.current++;
    const n = counterRef.current;
    const stage = STAGES[Math.floor(Math.random()*3)];
    const type  = PKT_TYPES[Math.floor(Math.random()*PKT_TYPES.length)];
    const srcCity  = CITIES_SHORT[Math.floor(Math.random()*CITIES_SHORT.length)];
    const dstCity  = CITIES_SHORT[Math.floor(Math.random()*CITIES_SHORT.length)];
    const enc   = ENCS[Math.floor(Math.random()*ENCS.length)];
    const proto = PROTOCOLS[Math.floor(Math.random()*PROTOCOLS.length)];
    const size  = Math.floor(Math.random()*4096+64);
    const latency = (Math.random()*12+0.4).toFixed(2);
    const status  = STATUSES[Math.floor(Math.random()*STATUSES.length)];
    const seqHex  = n.toString(16).toUpperCase().padStart(6,"0");
    const devId   = `DEV-${srcCity}-${String(Math.floor(Math.random()*500)+1).padStart(5,"0")}`;
    const sessionId = Math.random().toString(36).substring(2,10).toUpperCase();
    const hash    = Array.from({length:8},()=>Math.floor(Math.random()*16).toString(16)).join("").toUpperCase();
    const now     = new Date();
    return { id:`PKT-${seqHex}`, seq:n, stage, type, size, latency:parseFloat(latency),
      enc, proto, status, devId, srcCity, dstCity, sessionId, hash,
      ts: now.toISOString().slice(11,23),
      tsMs: now.getTime() };
  }

  // Self-contained fake stream — 3-5 packets every 300ms
  useEffect(() => {
    if (paused) return;
    const iv = setInterval(() => {
      const burst = Math.floor(Math.random()*3)+2;
      const newPkts = Array.from({length:burst}, genPacket);
      setLocalPackets(prev => [...newPkts, ...prev].slice(0, 300));
      // update throughput sparkline
      setBpsData(prev => {
        const totalBytes = newPkts.reduce((a,p)=>a+p.size,0);
        const bps = Math.floor(totalBytes * (1000/300));
        return [...prev.slice(1), { t: prev[prev.length-1].t+1, bps }];
      });
    }, 300);
    return () => clearInterval(iv);
  }, [paused]);

  // Auto-scroll terminal to top (newest packets are at top)
  useEffect(() => {
    if (termRef.current && !paused) termRef.current.scrollTop = 0;
  }, [localPackets]);

  const allPackets = [...localPackets, ...socketPackets].slice(0,300);
  const displayed  = filter === "ALL" ? allPackets : allPackets.filter(p=>p.type===filter||p.stage===filter);

  const stats = useMemo(() => ({
    total: allPackets.length,
    edge:    allPackets.filter(p=>p.stage==="EDGE").length,
    gateway: allPackets.filter(p=>p.stage==="GATEWAY").length,
    cloud:   allPackets.filter(p=>p.stage==="CLOUD").length,
    totalKB: (allPackets.reduce((a,p)=>a+(p.size||0),0)/1024).toFixed(1),
    avgLat:  allPackets.length ? (allPackets.reduce((a,p)=>a+(p.latency||0),0)/allPackets.length).toFixed(2) : "0.00",
    pps:     (allPackets.length / Math.max(1, (Date.now() - (allPackets[allPackets.length-1]?.tsMs||Date.now()))/1000)).toFixed(0)
  }), [allPackets]);

  return (
    <div style={{ display:"grid", gap:14 }}>

      {/* Metric row */}
      <div className="metric-grid" style={{ gridTemplateColumns:"repeat(6,1fr)" }}>
        {[
          { label:"PACKETS",  val: allPackets.length, color: CYAN },
          { label:"EDGE",     val: stats.edge,        color:"#00aaff" },
          { label:"GATEWAY",  val: stats.gateway,     color: GOLD },
          { label:"CLOUD",    val: stats.cloud,       color: GREEN },
          { label:"AVG LAT",  val:`${stats.avgLat}ms`,color: ORANGE },
          { label:"TOTAL KB", val:`${stats.totalKB}`, color:"#9B59B6" },
        ].map(m => (
          <div key={m.label} className="metric-card" style={{ padding:"10px 12px" }}>
            <div className="metric-val" style={{ fontSize:20, color:m.color }}>{m.val}</div>
            <div className="metric-label">{m.label}</div>
          </div>
        ))}
      </div>

      {/* Pipeline flow diagram */}
      <div className="card">
        <div className="card-title"><span className="dot" />End-to-End Encrypted Pipeline Flow
          <span style={{ marginLeft:"auto", fontSize:9, color:GREEN, fontFamily:"Share Tech Mono", display:"flex", alignItems:"center", gap:4 }}>
            <span style={{ width:6,height:6,borderRadius:"50%",background:GREEN,display:"inline-block",animation:"pulse 1s infinite" }} />
            LIVE · {allPackets.length} PACKETS
          </span>
        </div>
        <div className="pipeline-flow">
          {[
            { label:"EDGE LAYER",    sub:"500 IoT Devices",    enc:"AES-256-GCM", count:stats.edge, color:"#00aaff" }, null,
            { label:"GATEWAY LAYER", sub:"PKI Auth + mTLS",   enc:"TLS 1.3",     count:stats.gateway, color:GOLD }, null,
            { label:"CLOUD PLATFORM",sub:"Zero Trust Core",    enc:"AES-256-GCM", count:stats.cloud, color:GREEN }
          ].map((node,i) => node ? (
            <div key={i} className="pipeline-node active" style={{ borderColor:`${node.color}30` }}>
              <div className="pipeline-node-title" style={{ color:node.color }}>{node.label}</div>
              <div style={{ fontSize:10,color:"var(--dim)",marginBottom:6 }}>{node.sub}</div>
              <div className="enc-badge" style={{ borderColor:`${node.color}40`,color:node.color }}>🔒 {node.enc}</div>
              <div style={{ fontFamily:"Orbitron,monospace",fontSize:22,fontWeight:900,color:node.color,marginTop:8 }}>{node.count}</div>
              <div style={{ fontSize:9,color:"var(--dim)" }}>pkts processed</div>

                <span style={{ color:"#112233",fontSize:10 }}>#{p.hash||"????????"}</span>

              { label:"AES-256-CBC",       pct:31, color:"#9B59B6"},
              { label:"DTLS 1.3",          pct:74, color:"#1abc9c"},
            ].map(e => (
              <div key={e.label} style={{ background:"rgba(7,11,26,0.7)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:8,padding:"10px 12px" }}>
                <div style={{ fontFamily:"Orbitron,monospace",fontSize:18,fontWeight:900,color:e.color }}>{e.pct}%</div>

      </div>
    </div>
  );
}

        hash: d.blockchainHash || Array.from({ length: 16 }, () => Math.floor(Math.random() * 256).toString(16).padStart(2, "0")).join(""),
        previousHash: arr[arr.length - 1].hash,
        timestamp: d.registeredAt || new Date(Date.now() - (19 - i) * 86400000).toISOString(),

  "performance":   ()      => `Pipeline latency: <10ms avg. Packet throughput: ~2,400 pkts/sec. Encryption overhead: 0.3ms. Gateway auth: 4.2ms avg. Overall system efficiency: 98.6%`,
  "ddos":          ()      => `DDoS mitigation: Active rate limiting at 1M req/sec threshold. Geo-blocking enabled for 12 regions. CloudFlare relay active. Auto-scaling triggered when traffic exceeds 80% capacity.`,
  "policy":        ()      => `Active Zero Trust Policies: 1) Never trust, always verify. 2) Least-privilege access enforced. 3) Micro-segmentation on all 15 regions. 4) Continuous authentication every 300s. 5) All lateral movement blocked.`,
  "default":       ()      => `Query understood. Analyzing Zero Trust telemetry... Based on current threat posture and device health metrics, I recommend reviewing the SOC dashboard. Type 'help' for available AI commands.`
};

function getAIResponse(input, devices, threats, stats, user) {
  const q = input.toLowerCase();
  for (const [key, fn] of Object.entries(AI_RESPONSES)) {
    if (q.includes(key)) return fn(devices, threats, stats, user?.name);
  }
  // Check for device ID mention
  const devMatch = input.match(/DEV-[A-Z]{3}-\d{5}/i);
  if (devMatch) {
    const dev = devices.find(d => d.id?.toUpperCase() === devMatch[0].toUpperCase() || d.deviceId?.toUpperCase() === devMatch[0].toUpperCase());
    if (dev) return `Device ${dev.id}: Status=${dev.status}, Trust=${dev.trustScore}/100, Type=${dev.type}, Location=${dev.location?.city} ${dev.location?.country}, Cert=${dev.certificate?.valid?"VALID":"REVOKED"}, Issuer=${dev.certificate?.issuer}`;
  }
  return AI_RESPONSES.default();
}

function AISidebar({ devices, setDevices, threats, stats, onClose }) {
  const [tab, setTab]         = useState("helper");
  const [messages, setMessages] = useState([
    { role:"ai", text:"🤖 Zero Trust AI online. I can answer questions, predict threats, and control nodes. What do you need?" }
  ]);
  const [input, setInput]     = useState("");
  const [typing, setTyping]   = useState(false);
  const [cmdNode, setCmdNode] = useState("");
  const [cmdResult, setCmdResult] = useState(null);
  const [predRefresh, setPredRefresh] = useState(0);
  const chatRef = useRef(null);

  useEffect(() => { if(chatRef.current) chatRef.current.scrollTop = chatRef.current.scrollHeight; }, [messages]);

  const sendMsg = () => {
    if(!input.trim()) return;
    const userMsg = input.trim();
    setInput("");
    setMessages(prev => [...prev, { role:"user", text:userMsg }]);
    setTyping(true);
    setTimeout(() => {
      const resp = getAIResponse(userMsg, devices, threats, stats);
      setMessages(prev => [...prev, { role:"ai", text:resp }]);
      setTyping(false);
    }, 800 + Math.random()*600);
  };

  const executeCmd = (action) => {
    if (!cmdNode.trim()) { setCmdResult({ ok:false, msg:"Enter a Device ID first" }); return; }
    const id = cmdNode.trim().toUpperCase();
    const dev = devices.find(d => (d.id||d.deviceId||"").toUpperCase() === id);
    if (!dev) { setCmdResult({ ok:false, msg:`Device ${id} not found in registry` }); return; }

    let newStatus = dev.status, newTrust = dev.trustScore, msg = "";
    switch(action) {
      case "DISABLE":   newStatus="Blocked";   newTrust=0;   msg=`Node ${id} DISABLED — all sessions terminated, certificate revoked`; break;
      case "ISOLATE":   newStatus="Isolated";  newTrust=Math.min(dev.trustScore,20); msg=`Node ${id} ISOLATED — network access severed, forensic mode active`; break;
      case "QUARANTINE":newStatus="Blocked";   newTrust=5;   msg=`Node ${id} QUARANTINED — moved to restricted VLAN, keys invalidated`; break;
      case "RESTORE":   newStatus="Verified";  newTrust=75;  msg=`Node ${id} RESTORED — certificate renewed, trust score reset to 75`; break;
      case "ROTATE":    newTrust=Math.min(100,dev.trustScore+15); msg=`Node ${id} KEY ROTATED — new X.509 cert issued, trust score +15`; break;
      case "SCAN":      msg=`Node ${id} DEEP SCAN complete — ${Math.random()<0.3?"Anomaly detected: unusual outbound traffic":"No anomalies found. System clean."}. Trust score: ${dev.trustScore}/100`; break;
    }
    setDevices(prev => prev.map(d =>
      (d.id||d.deviceId||"").toUpperCase()===id ? {...d, status:newStatus, trustScore:newTrust, lastSeen:new Date().toISOString()} : d
    ));
    setCmdResult({ ok:true, msg });
    setMessages(prev=>[...prev,

  const critNodes = devices.filter(d=>d.trustScore<30).slice(0,5);

          <div style={{ fontSize:9, color:"var(--dim)", fontFamily:"Share Tech Mono,monospace" }}>Controller · Predictor · Helper</div>
        </div>
        <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6 }}>
          <span style={{ width:6,height:6,borderRadius:"50%",background:"var(--green)",boxShadow:"0 0 6px var(--green)",animation:"pulse 2s infinite" }} />
          <span style={{ fontSize:9,color:"var(--green)",fontFamily:"Share Tech Mono,monospace" }}>ONLINE</span>
          <button onClick={onClose} style={{ marginLeft:8,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",borderRadius:6,color:"var(--dim)",cursor:"pointer",padding:"4px 8px",fontSize:11 }}>✕</button>
        </div>
      </div>

      {/* Tabs */}
      <div style={{ display:"flex", borderBottom:"1px solid rgba(0,212,255,0.1)", flexShrink:0 }}>
        {[["helper","💬 HELPER"],["controller","⚡ CONTROLLER"],["predictor","🔮 PREDICTOR"]].map(([id,label])=>(
          <button key={id} onClick={()=>setTab(id)} style={{ flex:1, padding:"10px 4px", background:tab===id?"rgba(0,212,255,0.08)":"transparent", border:"none", borderBottom:tab===id?"2px solid var(--cyan)":"2px solid transparent", color:tab===id?"var(--cyan)":"var(--dim)", fontFamily:"Orbitron,monospace", fontSize:"8.5px", letterSpacing:.5, cursor:"pointer", fontWeight:700 }}>{label}</button>
        ))}
      </div>

      {/* ── HELPER TAB ── */}
      {tab==="helper" && (
        <div style={{ flex:1, display:"flex", flexDirection:"column", overflow:"hidden" }}>
          <div ref={chatRef} style={{ flex:1, overflowY:"auto", padding:"12px 14px", display:"flex", flexDirection:"column" }}>
            {messages.map((m,i)=>(
              <div key={i} className={m.role==="user"?"ai-msg-user":"ai-msg-ai"}>
                {m.role==="ai" && <span style={{ fontSize:9,color:"var(--cyan)",fontFamily:"Orbitron,monospace",display:"block",marginBottom:4 }}>🤖 SOVEREIGN AI</span>}
                {m.text}
              </div>
            ))}
            {typing && (
              <div className="ai-msg-ai">
                <span style={{ fontSize:9,color:"var(--cyan)",fontFamily:"Orbitron,monospace",display:"block",marginBottom:4 }}>🤖 SOVEREIGN AI</span>
                <span style={{ animation:"blink 0.8s infinite" }}>▋</span> Analyzing...
              </div>
            )}
          </div>
          {/* Quick prompts */}
          <div style={{ padding:"8px 14px", borderTop:"1px solid rgba(255,255,255,0.04)", display:"flex", gap:4, flexWrap:"wrap" }}>
            {["status","threat","recommend","predict","performance"].map(p=>(
              <button key={p} onClick={()=>{ setInput(p); }} style={{ padding:"3px 8px",border:"1px solid rgba(0,212,255,0.2)",background:"rgba(0,212,255,0.05)",borderRadius:4,color:"var(--cyan)",fontSize:9,fontFamily:"Share Tech Mono,monospace",cursor:"pointer" }}>{p}</button>
            ))}
          </div>
          <div style={{ padding:"10px 14px", borderTop:"1px solid rgba(0,212,255,0.1)", display:"flex", gap:8 }}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&sendMsg()} placeholder="Ask me anything..." style={{ flex:1,background:"rgba(7,11,26,0.8)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"var(--white)",padding:"8px 12px",fontSize:12,fontFamily:"Inter,sans-serif",outline:"none" }} />
            <button onClick={sendMsg} style={{ padding:"8px 14px",background:"linear-gradient(135deg,rgba(0,212,255,0.2),rgba(0,212,255,0.1))",border:"1px solid rgba(0,212,255,0.4)",borderRadius:8,color:"var(--cyan)",cursor:"pointer",fontFamily:"Orbitron,monospace",fontSize:10,fontWeight:700 }}>SEND</button>
          </div>
        </div>
      )}

      {/* ── CONTROLLER TAB ── */}
      {tab==="controller" && (
        <div style={{ flex:1, overflowY:"auto", padding:"14px" }}>
          <div style={{ fontSize:10,color:"var(--dim)",fontFamily:"Share Tech Mono,monospace",marginBottom:12 }}>Enter a Device ID to execute AI-powered control commands</div>

          <div style={{ marginBottom:12 }}>
            <input value={cmdNode} onChange={e=>setCmdNode(e.target.value)} placeholder="e.g. DEV-MUM-00042" style={{ width:"100%",background:"rgba(7,11,26,0.8)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:8,color:"var(--cyan)",padding:"9px 12px",fontSize:12,fontFamily:"Share Tech Mono,monospace",outline:"none",boxSizing:"border-box" }} />
          </div>

          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:14 }}>
            {[
              { action:"DISABLE",    label:"🔴 DISABLE",    color:"#FF3B3B", bg:"rgba(255,59,59,0.1)"  },
              { action:"ISOLATE",    label:"🔵 ISOLATE",    color:"#00D4FF", bg:"rgba(0,212,255,0.1)"  },
              { action:"QUARANTINE", label:"🟠 QUARANTINE", color:"#FF8C00", bg:"rgba(255,140,0,0.1)"  },
              { action:"RESTORE",    label:"🟢 RESTORE",    color:"#00FF88", bg:"rgba(0,255,136,0.1)"  },
              { action:"ROTATE",     label:"🔑 ROTATE KEY", color:"#C9A84C", bg:"rgba(201,168,76,0.1)" },
              { action:"SCAN",       label:"🔍 DEEP SCAN",  color:"#9B59B6", bg:"rgba(155,89,182,0.1)" },
            ].map(({action,label,color,bg})=>(
              <button key={action} className="ai-cmd-btn" onClick={()=>executeCmd(action)} style={{ background:bg, border:`1px solid ${color}40`, color, width:"100%", textAlign:"left" }}>
                {label}
              </button>
            ))}
          </div>

          {cmdResult && (
            <div style={{ padding:"10px 12px", borderRadius:8, border:`1px solid ${cmdResult.ok?"rgba(0,255,136,0.3)":"rgba(255,59,59,0.3)"}`, background:cmdResult.ok?"rgba(0,255,136,0.05)":"rgba(255,59,59,0.05)", fontSize:11, color:cmdResult.ok?"var(--green)":"var(--red)", marginBottom:14, fontFamily:"Share Tech Mono,monospace", lineHeight:1.6 }}>
              {cmdResult.ok?"✓":"✗"} {cmdResult.msg}
            </div>
          )}

          <div style={{ borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:12 }}>
            <div style={{ fontFamily:"Orbitron,monospace",fontSize:9,color:"var(--gold)",letterSpacing:1,marginBottom:8 }}>⚠ CRITICAL NODES</div>
            {critNodes.length===0 ? <div style={{ fontSize:10,color:"var(--dim)" }}>No critical nodes detected</div> :
            critNodes.map(d=>(
              <div key={d.id} onClick={()=>setCmdNode(d.id)} style={{ display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,border:"1px solid rgba(255,59,59,0.15)",background:"rgba(255,59,59,0.04)",marginBottom:5,cursor:"pointer" }}>
                <span style={{ width:6,height:6,borderRadius:"50%",background:"var(--red)",flexShrink:0 }} />
                <span style={{ fontFamily:"Share Tech Mono,monospace",fontSize:10,color:"var(--red)",flex:1 }}>{d.id}</span>
                <span style={{ fontSize:9,color:"var(--dim)" }}>{d.trustScore}/100</span>
                <span style={{ fontSize:9,color:"var(--dim)" }}>{d.location?.city}</span>
              </div>
            ))}
          </div>

          <div style={{ borderTop:"1px solid rgba(255,255,255,0.05)", paddingTop:12, marginTop:8 }}>
            <div style={{ fontFamily:"Orbitron,monospace",fontSize:9,color:"var(--orange)",letterSpacing:1,marginBottom:8 }}>⚠ SUSPICIOUS NODES</div>
            {susNodes.map(d=>(
              <div key={d.id} onClick={()=>setCmdNode(d.id)} style={{ display:"flex",alignItems:"center",gap:8,padding:"7px 10px",borderRadius:6,border:"1px solid rgba(255,140,0,0.15)",background:"rgba(255,140,0,0.04)",marginBottom:5,cursor:"pointer" }}>
                <span style={{ width:6,height:6,borderRadius:"50%",background:"var(--orange)",flexShrink:0 }} />
                <span style={{ fontFamily:"Share Tech Mono,monospace",fontSize:10,color:"var(--orange)",flex:1 }}>{d.id}</span>
                <span style={{ fontSize:9,color:"var(--dim)" }}>{d.trustScore}/100</span>
                <span style={{ fontSize:9,color:"var(--dim)" }}>{d.location?.city}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* ── PREDICTOR TAB ── */}
      {tab==="predictor" && (
        <div style={{ flex:1, overflowY:"auto", padding:"14px" }}>
          <div style={{ display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12 }}>
            <div style={{ fontFamily:"Orbitron,monospace",fontSize:9,color:"var(--cyan)",letterSpacing:1 }}>AI THREAT PREDICTIONS</div>
            <button onClick={()=>setPredRefresh(r=>r+1)} style={{ padding:"4px 10px",background:"rgba(0,212,255,0.08)",border:"1px solid rgba(0,212,255,0.2)",borderRadius:6,color:"var(--cyan)",cursor:"pointer",fontFamily:"Orbitron,monospace",fontSize:8 }}>↻ REFRESH</button>
          </div>

          {/* Overall risk score */}
          <div style={{ background:"linear-gradient(135deg,rgba(255,59,59,0.08),rgba(13,18,53,0.9))",border:"1px solid rgba(255,59,59,0.2)",borderRadius:10,padding:14,marginBottom:12,textAlign:"center" }}>
            <div style={{ fontSize:9,color:"var(--dim)",fontFamily:"Share Tech Mono,monospace",marginBottom:6 }}>PREDICTED THREAT LEVEL (NEXT 60 MIN)</div>
            <div style={{ fontFamily:"Orbitron,monospace",fontSize:42,fontWeight:900,color:"var(--red)" }}>{Math.min(99,Math.floor(threats.filter(t=>t.severity==="Critical"||t.severity==="High").length*1.8+30))}<span style={{ fontSize:18 }}>%</span></div>
            <div style={{ fontSize:10,color:"var(--red)",marginTop:4 }}>HIGH RISK</div>
          </div>

          {/* Prediction cards */}
          {[
            { icon:"💥", title:"DDoS Surge", conf:Math.floor(75+Math.random()*20), time:"~18 min", color:"#FF3B3B", desc:`${Math.floor(threats.length*1.4+200)} pkts/sec expected. Target: cloud ingress.` },
            { icon:"👾", title:"Device Spoofing", conf:Math.floor(60+Math.random()*25), time:"~34 min", color:"#FF8C00", desc:`${devices.filter(d=>d.status==="Suspicious").length} suspicious nodes may attempt certificate replay.` },
            { icon:"🔓", title:"Unauthorized Access", conf:Math.floor(50+Math.random()*30), time:"~47 min", color:"#C9A84C", desc:`Brute-force pattern detected from ${[...new Set(threats.map(t=>t.sourceDevice))].length} unique sources.` },
            { icon:"📤", title:"Data Exfiltration", conf:Math.floor(40+Math.random()*20), time:"~52 min", color:"#9B59B6", desc:`Anomalous outbound patterns on ${Math.floor(Math.random()*8+3)} nodes. Covert channel suspected.` },
          ].map((p,i)=>(
            <div key={i} style={{ border:`1px solid ${p.color}25`,background:`${p.color}08`,borderRadius:10,padding:12,marginBottom:10 }}>
              <div style={{ display:"flex",alignItems:"center",gap:8,marginBottom:6 }}>
                <span style={{ fontSize:18 }}>{p.icon}</span>
                <div style={{ flex:1 }}>
                  <div style={{ fontFamily:"Orbitron,monospace",fontSize:10,color:p.color,fontWeight:700 }}>{p.title}</div>
                  <div style={{ fontSize:9,color:"var(--dim)",fontFamily:"Share Tech Mono,monospace" }}>ETA: {p.time}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  <div style={{ fontFamily:"Orbitron,monospace",fontSize:16,fontWeight:900,color:p.color }}>{p.conf}%</div>
                  <div style={{ fontSize:8,color:"var(--dim)" }}>confidence</div>
                </div>
              </div>
              <div style={{ fontSize:10,color:"var(--dim)",lineHeight:1.5,marginBottom:8 }}>{p.desc}</div>
              <div style={{ height:4,background:"rgba(255,255,255,0.06)",borderRadius:2 }}>
                <div style={{ height:"100%",width:`${p.conf}%`,background:`linear-gradient(90deg,${p.color}80,${p.color})`,borderRadius:2,transition:"width 0.5s" }} />
              </div>
            </div>
          ))}

          {/* Recommendations */}
          <div style={{ background:"rgba(0,255,136,0.04)",border:"1px solid rgba(0,255,136,0.15)",borderRadius:10,padding:12 }}>
            <div style={{ fontFamily:"Orbitron,monospace",fontSize:9,color:"var(--green)",letterSpacing:1,marginBottom:8 }}>✓ AI RECOMMENDATIONS</div>
            {[
              `Isolate ${devices.filter(d=>d.trustScore<20).length} nodes with trust < 20`,
              `Rotate certificates on ${devices.filter(d=>d.status==="Suspicious").length} suspicious nodes`,
              `Increase sampling rate on ${[...new Set(threats.slice(0,10).map(t=>t.type))][0]||"MITM"} attack vector`,
              "Enable geo-fencing on new device registrations",
              "Activate honeypot nodes in Mumbai and Singapore clusters"
            ].map((r,i)=>(
              <div key={i} style={{ display:"flex",gap:8,fontSize:10,color:"var(--dim)",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.04)" }}>
                <span style={{ color:"var(--green)",flexShrink:0 }}>→</span>{r}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}
createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
